services:
  web-api:
    build: .
    ports:
      - "3000:3000"
    networks:
      - frontend
      - backend
    depends_on:
      database:
        condition: service_healthy

  database:
    image: postgres
    environment:
      POSTGRES_PASSWORD: password123
      POSTGRES_DB: mydb
    volumes:
      - pgdata:/var/lib/postgresql
    networks:
      - backend
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  cache:
    image: redis
    networks:
      - backend

  proxy:
    image: nginx
    ports:
      - "80:80"
    networks:
      - frontend

networks:
  frontend:
  backend:

volumes:
  pgdata:
